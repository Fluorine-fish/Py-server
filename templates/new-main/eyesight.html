<div class="eyesight-container">
    <div class="grid">
        <!-- 环境监测区域 -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">环境监测</h3>
            </div>
            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="metric-label">环境光线</div>
                    <div class="metric-value" id="lightLevel">-</div>
                    <div class="metric-icon" id="lightIcon"></div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">屏幕距离</div>
                    <div class="metric-value" id="screenDistance">-</div>
                    <div class="metric-icon" id="distanceIcon"></div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">眨眼频率</div>
                    <div class="metric-value" id="blinkRate">-</div>
                    <div class="metric-icon" id="blinkIcon"></div>
                </div>
            </div>
        </div>

        <!-- 实时状态和建议 -->
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">状态提醒</h3>
            </div>
            <div class="status-grid">
                <div class="status-item" id="lightStatus">
                    <div class="status-icon"></div>
                    <div class="status-content">
                        <div class="status-title">光线状态</div>
                        <div class="status-message">检测中...</div>
                    </div>
                </div>
                <div class="status-item" id="distanceStatus">
                    <div class="status-icon"></div>
                    <div class="status-content">
                        <div class="status-title">使用距离</div>
                        <div class="status-message">检测中...</div>
                    </div>
                </div>
                <div class="status-item" id="timeStatus">
                    <div class="status-icon"></div>
                    <div class="status-content">
                        <div class="status-title">用眼时间</div>
                        <div class="status-message">检测中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 用眼数据统计 -->
    <div class="grid mt-4">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">今日用眼统计</h3>
            </div>
            <div class="chart-container">
                <canvas id="usageChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">光照环境变化</h3>
            </div>
            <div class="chart-container">
                <canvas id="lightChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 护眼建议 -->
    <div class="card mt-4">
        <div class="card-header">
            <h3 class="card-title">护眼建议</h3>
        </div>
        <div class="advice-container" id="eyesightAdvice">
            <!-- 建议内容将通过JavaScript动态生成 -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    let usageChart, lightChart;
    let updateInterval;

    // 初始化图表
    function initializeCharts() {
        // 用眼时间统计图
        const usageCtx = document.getElementById('usageChart').getContext('2d');
        usageChart = new Chart(usageCtx, {
            type: 'bar',
            data: {
                labels: ['良好', '一般', '疲劳', '过度'],
                datasets: [{
                    label: '用眼时间统计',
                    data: [0, 0, 0, 0],
                    backgroundColor: [
                        'var(--secondary-color)',
                        'var(--primary-color)',
                        'var(--warning-color)',
                        'var(--danger-color)'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: value => value + '分钟'
                        }
                    }
                }
            }
        });

        // 光照环境变化图
        const lightCtx = document.getElementById('lightChart').getContext('2d');
        lightChart = new Chart(lightCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '光照强度',
                    data: [],
                    borderColor: 'var(--primary-color)',
                    tension: 0.4,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: value => value + ' lux'
                        }
                    }
                }
            }
        });
    }

    // 更新环境监测数据
    function updateEnvironmentData() {
        fetch('/api/get_eyesight_data')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    updateMetrics(data.environment);
                    updateStatus(data.status_info);
                    updateCharts(data.statistics);
                    updateAdvice(data.advice);
                }
            });
    }

    // 更新指标显示
    function updateMetrics(env) {
        // 更新光照强度
        document.getElementById('lightLevel').textContent = env.light_level + ' lux';
        updateMetricIcon('lightIcon', env.light_status);

        // 更新屏幕距离
        document.getElementById('screenDistance').textContent = env.screen_distance + ' cm';
        updateMetricIcon('distanceIcon', env.distance_status);

        // 更新眨眼频率
        document.getElementById('blinkRate').textContent = env.blink_rate + ' 次/分';
        updateMetricIcon('blinkIcon', env.blink_status);
    }

    // 更新状态图标和消息
    function updateStatus(statusInfo) {
        // 更新光线状态
        updateStatusItem('lightStatus', statusInfo.light);
        
        // 更新距离状态
        updateStatusItem('distanceStatus', statusInfo.distance);
        
        // 更新用眼时间状态
        updateStatusItem('timeStatus', statusInfo.usage_time);
    }

    // 更新单个状态项
    function updateStatusItem(elementId, status) {
        const element = document.getElementById(elementId);
        const icon = element.querySelector('.status-icon');
        const message = element.querySelector('.status-message');

        icon.className = `status-icon ${status.type}`;
        message.textContent = status.message;
        element.className = `status-item ${status.type}`;
    }

    // 更新图标状态
    function updateMetricIcon(elementId, status) {
        const element = document.getElementById(elementId);
        element.className = `metric-icon ${status}`;
    }

    // 更新图表数据
    function updateCharts(stats) {
        // 更新用眼时间统计
        if (stats.usage_distribution) {
            usageChart.data.datasets[0].data = [
                stats.usage_distribution.good || 0,
                stats.usage_distribution.normal || 0,
                stats.usage_distribution.tired || 0,
                stats.usage_distribution.excessive || 0
            ];
            usageChart.update();
        }

        // 更新光照变化趋势
        if (stats.light_trend) {
            const trend = stats.light_trend;
            lightChart.data.labels = trend.map(point => formatTime(point.time));
            lightChart.data.datasets[0].data = trend.map(point => point.value);
            lightChart.update();
        }
    }

    // 更新护眼建议
    function updateAdvice(advice) {
        const container = document.getElementById('eyesightAdvice');
        if (!advice || advice.length === 0) {
            container.innerHTML = '<div class="no-advice">暂无护眼建议</div>';
            return;
        }

        let adviceHtml = '<div class="advice-list">';
        advice.forEach(item => {
            adviceHtml += `
                <div class="advice-item ${item.type}">
                    <div class="advice-icon"></div>
                    <div class="advice-content">
                        <div class="advice-title">${item.title}</div>
                        <div class="advice-text">${item.content}</div>
                    </div>
                </div>
            `;
        });
        adviceHtml += '</div>';
        container.innerHTML = adviceHtml;
    }

    // 格式化时间
    function formatTime(timestamp) {
        return new Date(timestamp).toLocaleTimeString('zh-CN', {
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // 初始化并启动定时更新
    initializeCharts();
    updateEnvironmentData();
    updateInterval = setInterval(updateEnvironmentData, 1000);
});
</script>

.status-grid {

</style>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能台灯监控系统</title>
    <link rel="stylesheet" href="/static/css/new-ui/base.css">
    <link rel="stylesheet" href="/static/css/new-ui/tabs.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>儿童智能台灯监控系统</h1>
            <nav class="tabs-container" id="mainTabs" data-persistent="true">
                <ul class="tabs-nav">
                    <li class="tabs-nav-item"><a href="#overview" class="tabs-nav-link active" data-tab="overview">总览</a></li>
                    <li class="tabs-nav-item"><a href="#posture" class="tabs-nav-link" data-tab="posture">坐姿监控</a></li>
                    <li class="tabs-nav-item"><a href="#sitting" class="tabs-nav-link" data-tab="sitting">久坐监控</a></li>
                    <li class="tabs-nav-item"><a href="#settings" class="tabs-nav-link" data-tab="settings">设置</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <!-- 总览面板 -->
            <section id="overview" class="tab-content active">
                <div class="dashboard">
                    <div class="status-card">
                        <h3>实时状态</h3>
                        <div id="current-status">
                            <div class="status-item">
                                <span class="label">坐姿状态:</span>
                                <span id="posture-status" class="value status-indicator">正在检测...</span>
                            </div>
                            <div class="status-item">
                                <span class="label">已坐时间:</span>
                                <span id="sitting-time" class="value">0分钟</span>
                            </div>
                            <div class="status-item">
                                <span class="label">头部角度:</span>
                                <span id="head-angle" class="value">0°</span>
                            </div>
                            <div class="status-item">
                                <span class="label">系统状态:</span>
                                <span id="system-status" class="value status-indicator">已连接</span>
                            </div>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>今日统计</h3>
                        <div class="chart-container">
                            <canvas id="daily-stats-chart"></canvas>
                        </div>
                    </div>

                    <div class="alert-card">
                        <h3>提醒记录</h3>
                        <div id="alerts-list" class="alerts-container">
                            <!-- 提醒记录将通过JavaScript动态添加 -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- 坐姿监控面板 -->
            <section id="posture" class="tab-content">
                <div class="monitor-panel">
                    <div class="video-container">
                        <video id="posture-video" autoplay playsinline></video>
                        <div class="video-overlay">
                            <div id="posture-indicators"></div>
                        </div>
                    </div>
                    <div class="analysis-panel">
                        <h3>姿势分析</h3>
                        <div id="posture-analysis">
                            <div class="metric">
                                <span class="label">当前姿势质量:</span>
                                <span id="posture-quality" class="value">-</span>
                            </div>
                            <div class="metric">
                                <span class="label">头部偏角:</span>
                                <span id="head-angle-value" class="value">-</span>
                            </div>
                        </div>
                        <div class="chart-container">
                            <canvas id="posture-trend-chart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 久坐监控面板 -->
            <section id="sitting" class="tab-content">
                <div class="monitor-panel">
                    <div class="status-panel">
                        <h3>久坐监控</h3>
                        <div id="sitting-analysis">
                            <div class="metric">
                                <span class="label">当前已坐时间:</span>
                                <span id="current-sitting-time" class="value">-</span>
                            </div>
                            <div class="metric">
                                <span class="label">上次休息时间:</span>
                                <span id="last-break-time" class="value">-</span>
                            </div>
                            <div class="progress-container">
                                <div class="progress-label">距离建议休息时间还有</div>
                                <div class="progress-bar">
                                    <div id="sitting-progress" class="progress"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="sitting-pattern-chart"></canvas>
                    </div>
                </div>
            </section>

            <!-- 设置面板 -->
            <section id="settings" class="tab-content">
                <div class="settings-panel">
                    <h3>监控设置</h3>
                    <form id="monitor-settings">
                        <div class="setting-group">
                            <h4>坐姿监控</h4>
                            <div class="setting-item">
                                <label for="head-angle-threshold">头部角度阈值 (度)</label>
                                <input type="number" id="head-angle-threshold" 
                                       min="15" max="45" value="30">
                            </div>
                            <div class="setting-item">
                                <label for="posture-warning-interval">坐姿警告间隔 (秒)</label>
                                <input type="number" id="posture-warning-interval" 
                                       min="30" max="300" value="60">
                            </div>
                        </div>
                        
                        <div class="setting-group">
                            <h4>久坐监控</h4>
                            <div class="setting-item">
                                <label for="sitting-threshold">久坐时间阈值 (分钟)</label>
                                <input type="number" id="sitting-threshold" 
                                       min="15" max="120" value="30">
                            </div>
                            <div class="setting-item">
                                <label for="break-duration">建议休息时长 (分钟)</label>
                                <input type="number" id="break-duration" 
                                       min="3" max="15" value="5">
                            </div>
                        </div>
                        
                        <div class="setting-group">
                            <h4>通知设置</h4>
                            <div class="setting-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="enable-voice" checked>
                                    启用语音提醒
                                </label>
                            </div>
                            <div class="setting-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="enable-light" checked>
                                    启用灯光提醒
                                </label>
                            </div>
                        </div>
                        
                        <div class="button-group">
                            <button type="submit" class="primary">保存设置</button>
                            <button type="button" class="secondary" id="reset-settings">重置默认</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="/static/js/new-ui/main.js"></script>
    <script src="/static/js/new-ui/tabs.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>

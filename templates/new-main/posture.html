<div class="posture-container">
    <!-- 视频和状态区域 -->
    <div class="grid">
        <div class="card video-card">
            <div class="card-header">
                <h3 class="card-title">实时视频</h3>
            </div>
            <div class="video-feed">
                <img id="postureVideo" src="/pose_video_feed" alt="姿势分析视频流">
            </div>
            <div class="video-controls">
                <button class="btn btn-primary" id="startPostureBtn">开始分析</button>
                <button class="btn btn-danger" id="stopPostureBtn" disabled>停止分析</button>
            </div>
        </div>

        <div class="card status-card">
            <div class="card-header">
                <h3 class="card-title">姿势状态</h3>
            </div>
            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="metric-label">当前姿势</div>
                    <div id="currentPosture" class="metric-value">-</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">头部角度</div>
                    <div id="headAngle" class="metric-value">-</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">坐姿评分</div>
                    <div id="postureScore" class="metric-value">-</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">保持时间</div>
                    <div id="postureDuration" class="metric-value">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计和分析区域 -->
    <div class="grid mt-4">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">今日统计</h3>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">良好姿势</div>
                    <div id="goodPostureTime" class="stat-value">0分钟</div>
                    <div class="stat-percentage good">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">不良姿势</div>
                    <div id="badPostureTime" class="stat-value">0分钟</div>
                    <div class="stat-percentage warning">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">严重偏差</div>
                    <div id="severePostureTime" class="stat-value">0分钟</div>
                    <div class="stat-percentage danger">0%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">总监测时间</div>
                    <div id="totalMonitorTime" class="stat-value">0分钟</div>
                    <div class="stat-percentage">100%</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title">改善建议</h3>
            </div>
            <div id="postureAdvice" class="advice-container">
                <!-- 建议将通过JavaScript动态添加 -->
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let isMonitoring = false;
    let updateInterval;

    // 控制按钮
    const startBtn = document.getElementById('startPostureBtn');
    const stopBtn = document.getElementById('stopPostureBtn');
    
    startBtn.addEventListener('click', function() {
        fetch('/api/start_monitoring', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    isMonitoring = true;
                    updateControlState();
                    startUpdates();
                    showNotification('姿势监测已启动', 'success');
                }
            });
    });
    
    stopBtn.addEventListener('click', function() {
        fetch('/api/stop_monitoring', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    isMonitoring = false;
                    updateControlState();
                    stopUpdates();
                    showNotification('姿势监测已停止', 'success');
                }
            });
    });

    // 更新控制状态
    function updateControlState() {
        startBtn.disabled = isMonitoring;
        stopBtn.disabled = !isMonitoring;
    }

    // 开始定期更新
    function startUpdates() {
        updatePostureStatus();
        updateInterval = setInterval(updatePostureStatus, 1000);
    }

    // 停止定期更新
    function stopUpdates() {
        clearInterval(updateInterval);
        resetDisplays();
    }

    // 更新姿势状态
    function updatePostureStatus() {
        fetch('/api/get_pose_result')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    updateMetrics(data.pose_result);
                    updateAdvice(data.pose_result);
                }
            });
    }

    // 更新指标显示
    function updateMetrics(result) {
        const posture = result.posture || '-';
        const angle = result.head_angle ? result.head_angle.toFixed(1) + '°' : '-';
        const score = result.score ? result.score.toFixed(0) : '-';
        const duration = formatDuration(result.duration);

        document.getElementById('currentPosture').textContent = posture;
        document.getElementById('headAngle').textContent = angle;
        document.getElementById('postureScore').textContent = score;
        document.getElementById('postureDuration').textContent = duration;

        // 更新统计数据
        if (result.statistics) {
            const stats = result.statistics;
            document.getElementById('goodPostureTime').textContent = formatDuration(stats.good_time);
            document.getElementById('badPostureTime').textContent = formatDuration(stats.bad_time);
            document.getElementById('severePostureTime').textContent = formatDuration(stats.severe_time);
            document.getElementById('totalMonitorTime').textContent = formatDuration(stats.total_time);

            // 更新百分比
            const total = stats.total_time || 1;  // 避免除以0
            updatePercentage('good', (stats.good_time / total * 100).toFixed(1));
            updatePercentage('warning', (stats.bad_time / total * 100).toFixed(1));
            updatePercentage('danger', (stats.severe_time / total * 100).toFixed(1));
        }
    }

    // 更新建议
    function updateAdvice(result) {
        const adviceContainer = document.getElementById('postureAdvice');
        adviceContainer.innerHTML = '';

        if (result.advice && result.advice.length > 0) {
            result.advice.forEach(advice => {
                const adviceEl = document.createElement('div');
                adviceEl.className = 'advice-item';
                adviceEl.innerHTML = `
                    <div class="advice-icon ${advice.type}"></div>
                    <div class="advice-content">${advice.message}</div>
                `;
                adviceContainer.appendChild(adviceEl);
            });
        } else {
            adviceContainer.innerHTML = '<div class="no-advice">保持当前良好姿势</div>';
        }
    }

    // 重置显示
    function resetDisplays() {
        document.getElementById('currentPosture').textContent = '-';
        document.getElementById('headAngle').textContent = '-';
        document.getElementById('postureScore').textContent = '-';
        document.getElementById('postureDuration').textContent = '-';
        document.getElementById('postureAdvice').innerHTML = '';
    }

    // 辅助函数
    function formatDuration(seconds) {
        if (!seconds) return '-';
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        
        if (hours > 0) {
            return `${hours}时${minutes}分`;
        } else if (minutes > 0) {
            return `${minutes}分${secs}秒`;
        } else {
            return `${secs}秒`;
        }
    }

    function updatePercentage(type, value) {
        const elements = document.querySelectorAll(`.stat-percentage.${type}`);
        elements.forEach(el => {
            el.textContent = `${value}%`;
        });
    }

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }

    // 检查初始状态
    fetch('/api/status')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                isMonitoring = data.app_status.emotion_analysis_running;
                updateControlState();
                if (isMonitoring) {
                    startUpdates();
                }
            }
        });
});
</script>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面智能体家长端</title>
    <style>
        body {
            font-family: "Helvetica Neue", sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .section {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        canvas {
            width: 100% !important;
            max-width: 700px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background-color: #4a90e2;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }

            button:hover {
                background-color: #357abd;
            }

        #reportOutput {
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 20px;
            }

            h2 {
                font-size: 18px;
            }

            .section {
                padding: 15px;
                margin-bottom: 15px;
            }

            button {
                width: 48%;
                margin: 5px 1%;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>桌面智能体 - 家长端监控面板</h1>
    </header>
    <main>

        <!-- 实时视频监控 -->
        <div class="section">
            <h2>实时监控</h2>
            <video id="videoStream" autoplay playsinline></video>
            <p>系统正在实时检测坐姿与情绪...</p>
        </div>

        <!-- 坐姿监测 -->
        <div class="section">
            <h2>坐姿监测</h2>
            <p>记录一天内坐姿不良次数：</p>
            <canvas id="postureChart"></canvas>
        </div>

        <!-- 情绪监测 -->
        <div class="section">
            <h2>情绪波动</h2>
            <p>情绪分布（快乐、生气、悲伤、困惑等）：</p>
            <canvas id="emotionChart"></canvas>
        </div>

        <!-- 专注度 -->
        <div class="section">
            <h2>学习专注度</h2>
            <p>记录每小时专注时间百分比：</p>
            <canvas id="focusChart"></canvas>
        </div>

        <!-- 报告生成 -->
        <div class="section">
            <h2>日报 / 周报生成</h2>
            <button onclick="generateReport('daily')">生成日报</button>
            <button onclick="generateReport('weekly')">生成周报</button>
            <div id="reportOutput"></div>
        </div>
    </main>

    <script>
    // 示例数据
    const postureData = [3, 1, 2, 4, 1, 0, 5]; // 每天坐姿不良次数
    const emotionData = {
      labels: ['快乐', '悲伤', '生气', '困惑', '专注'],
      data: [20, 5, 10, 7, 30]
    };
    const focusData = [80, 60, 70, 90, 50, 60, 85]; // 每小时专注度

    // 实时摄像头
    const video = document.getElementById('videoStream');
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          video.srcObject = stream;
        })
        .catch(err => {
          console.error("无法访问摄像头:", err);
        });
    }

    // 坐姿图表
    new Chart(document.getElementById('postureChart'), {
      type: 'bar',
      data: {
        labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
        datasets: [{
          label: '坐姿不良次数',
          data: postureData,
          backgroundColor: '#f67280'
        }]
      },
      options: { responsive: true }
    });

    // 情绪图表
    new Chart(document.getElementById('emotionChart'), {
      type: 'pie',
      data: {
        labels: emotionData.labels,
        datasets: [{
          data: emotionData.data,
          backgroundColor: ['#6a89cc', '#e55039', '#f6b93b', '#60a3bc', '#78e08f']
        }]
      },
      options: { responsive: true }
    });

    // 专注度图表
    new Chart(document.getElementById('focusChart'), {
      type: 'line',
      data: {
        labels: ['9:00', '10:00', '11:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [{
          label: '专注度(%)',
          data: focusData,
          fill: false,
          borderColor: '#38ada9'
        }]
      },
      options: { responsive: true }
    });

    // 生成日报或周报
    function generateReport(type) {
      const postureSummary = type === 'daily'
        ? `今日坐姿不良次数：${postureData[6]} 次`
        : `本周平均坐姿不良次数：${(postureData.reduce((a,b)=>a+b,0)/7).toFixed(2)} 次/天`;

      const mainEmotion = emotionData.labels[emotionData.data.indexOf(Math.max(...emotionData.data))];
      const focusSummary = type === 'daily'
        ? `最高专注度：${Math.max(...focusData)}%`
        : `平均专注度：${(focusData.reduce((a,b)=>a+b,0)/focusData.length).toFixed(2)}%`;

      const reportText = `
        <p>${postureSummary}</p>
        <p>主要情绪：${mainEmotion}</p>
        <p>${focusSummary}</p>
      `;

      document.getElementById('reportOutput').innerHTML = `<div class="section">${reportText}</div>`;
    }
    </script>
</body>
</html>
